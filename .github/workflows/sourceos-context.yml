name: SourceOS Context Adapter

on:
  pull_request:
    paths:
      - "src/bin/sourceos-context.rs"
      - "src/sourceos_context_adapter.rs"
      - "tests/sourceos_context_cli.rs"
      - "schemas/sourceos-smart-tree-adapter.v1.schema.json"
      - "tools/validate_sourceos_adapter_schema.py"
      - "tools/validate_sourceos_adapter_live_outputs.py"
      - "policy/sourceos.repo_context.read_only.yaml"
      - ".github/workflows/sourceos-context.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
      - "socioprophet/**"
    paths:
      - "src/bin/sourceos-context.rs"
      - "src/sourceos_context_adapter.rs"
      - "tests/sourceos_context_cli.rs"
      - "schemas/sourceos-smart-tree-adapter.v1.schema.json"
      - "tools/validate_sourceos_adapter_schema.py"
      - "tools/validate_sourceos_adapter_live_outputs.py"
      - "policy/sourceos.repo_context.read_only.yaml"
      - ".github/workflows/sourceos-context.yml"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  sourceos-context:
    name: Build and test sourceos-context
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate adapter JSON schema examples
        run: |
          python -m pip install --upgrade jsonschema
          python tools/validate_sourceos_adapter_schema.py

      - name: Build adapter
        run: cargo build --bin sourceos-context

      - name: Validate live adapter outputs
        run: python tools/validate_sourceos_adapter_live_outputs.py

      - name: Run adapter smoke tests
        run: cargo test --test sourceos_context_cli -- --nocapture
